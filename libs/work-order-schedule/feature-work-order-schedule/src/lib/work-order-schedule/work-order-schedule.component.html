<div class="page">
  <h1 class="title">Work Orders</h1>

  <ostt-dropdown
    label="Timescale"
    [items]="zoomLevels"
    (itemSelected)="handleZoomLevelChange($event)"
  />

  <ostt-timeline-board
    titleColumn="Work Center"
    [startDate]="startDate()"
    [endDate]="endDate()"
    [rows]="dataRows()"
    [zoomLevel]="zoomLevel()"
    [timelineBarActionsRef]="timelineOrderActions"
    (boardGridCLicked)="openScheduleForm($event)"
  />
</div>

<ng-template #timelineOrderActions let-order="data">
  <ostt-action-menu
    [menuItems]="workOrderActions"
    (actionSelected)="handleOrderActionSelected($event, order)"
  ></ostt-action-menu>
</ng-template>
